name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should the gateway behave or be extended?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, related issues, or constraints.
