services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: openai-compatible-llm-gateway:latest
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    volumes:
      - ../config/default.yaml:/app/config/default.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
