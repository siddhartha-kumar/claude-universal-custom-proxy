services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: claude-universal-custom-proxy:latest
    env_file:
      - ../.env
    environment:
      OLLAMA_LOCAL_BASE_URL: http://ollama:11434
    ports:
      - "8080:8080"
    volumes:
      - ../config/default.yaml:/app/config/default.yaml:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  ollama-data:
